        body {

            flex-direction: column;
            min-height: 100vh; /* Ensure body takes full viewport height */

        h1, h2, h3, h4 {

        section h2 {

            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
            letter-spacing: 1px;
            animation: gradientShift 8s ease infinite;
            display: inline-block;
            filter: brightness(1.15);
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        [data-theme="dark"] section h2 {
            background: linear-gradient(90deg, #81c784 0%, #a8d5a8 50%, #81c784 100%);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 500;
            animation: gradientShift 8s ease infinite;
            filter: brightness(1.15);
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        p {
            margin-bottom: 1rem;
        }

        ul {
            list-style-position: inside;
            margin-bottom: 1rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        /* --- Navigation --- */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            height: 80px;
            padding: 0 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--nav-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
        }

        .logo {
            color: var(--text-header);

        .theme-toggle {

        }

        .theme-toggle svg {
            width: 24px;
            height: 24px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;

        .menu-toggle {

            visibility: hidden;
            transform: translateY(20px);

        .back-top-btn.visible {

        .footer-qr p {

        .footer-bottom {

            .footer-grid { grid-template-columns: 1fr; text-align: center; gap: 3rem; }
            .footer-brand p { margin: 1.5rem auto 0; text-align: center; }
            .footer-nav-links { align-items: center; justify-content: center; }
            .footer-brand .logo { justify-content: center; }
            .footer-qr { display: none; }

            .nav-links.active {

            .menu-toggle.active span:nth-child(2) { opacity: 0; }
            .menu-toggle.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }
            
            .nav-links a.nav-contact-btn {
                display: inline-block;
                width: max-content;
                margin: 0 auto;

            .brand-name {
                font-size: 1.2rem;
            }
            .tagline {

            font-weight: 400;

    <script>
// --- Navigation & Mobile Menu Toggle ---
        const menuToggle = document.getElementById('menuToggle');
        const navLinks = document.getElementById('navLinks');
        const navItems = document.querySelectorAll('.nav-links a, .logo, .footer-nav-links a');
        const navBar = document.querySelector('nav');

        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        navItems.forEach(item => {
            item.addEventListener('click', function(e) {
                const href = this.getAttribute('href');
                if(href && href.startsWith('preview1.html#')) {
                    // Close mobile menu on click
                    menuToggle.classList.remove('active');
                    navLinks.classList.remove('active');
                }
            });
        });

// --- Theme Toggle Logic ---
        const themeToggleBtn = document.getElementById('themeToggle');
        const rootElement = document.documentElement;
        
        const svgMoon = `<svg viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`;
        const svgSun = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`;

        function updateThemeIcon(theme) {
            themeToggleBtn.innerHTML = theme === 'dark' ? svgSun : svgMoon;
        }

        const savedTheme = localStorage.getItem('theme') || 'light';
        rootElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);

        themeToggleBtn.addEventListener('click', () => {
            const currentTheme = rootElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            rootElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        });

// --- Back to Top & WhatsApp Button Logic ---
        const backToTopBtn = document.getElementById('backToTop');
        const whatsappBtn = document.querySelector('.whatsapp-btn');

        window.addEventListener('scroll', () => {
            // Calculate 20% of total scrollable height
            const totalScrollableHeight = document.documentElement.scrollHeight - window.innerHeight;
            const scrollPercentage = (window.scrollY / totalScrollableHeight) * 100;

            // Show WhatsApp button at 15% scroll
            if (scrollPercentage > 0) {
                whatsappBtn.classList.add('visible');
            } else {
                whatsappBtn.classList.remove('visible');
            }

            // Show Back to Top button at 300px scroll
            if (window.scrollY > 300) {
                backToTopBtn.classList.add('visible');
            } else {
                backToTopBtn.classList.remove('visible');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
        });

        // Prevent right-click on all images
        document.addEventListener('contextmenu', (e) => {
            if (e.target.tagName === 'IMG') {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
